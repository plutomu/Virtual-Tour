<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtual Tour | Dinas Tenaga Kerja Prov. Jateng</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Pannellum 360 Viewer -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <style>
        #panorama {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        /* Custom styles to hide pannellum controls if we want a cleaner look */
        .pnlm-control-bar,
        .pnlm-panorama-info {
            display: none !important;
        }
    </style>
    <link rel="stylesheet" href="map.css">
    <script src="map.js"></script>
</head>

<body>

    <div id="app">

        <!-- 360 Viewer Container -->
        <div id="panorama"></div>

        <!-- NEW BUILDING-SPECIFIC MAP -->
        <div class="building-map-overlay">
            <div class="map-header">Building Layout</div>
            <div class="map-canvas"></div>
        </div>



        <!-- BOTTOM-LEFT: Room Info only -->
        <footer class="info-bar">
            <div class="inst-badge">Dinas Tenaga Kerja Prov. Jateng</div>
            <h1 id="room-title"></h1>
            <p id="room-desc"></p>
        </footer>

        <!-- Navigation arrows -->
        <div id="nav-arrows"></div>

        <div id="flash"></div>
    </div>

    <script src="main.js"></script>
</body>

</html>
